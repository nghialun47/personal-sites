<!doctype html>
<html lang="en">

		<meta charset="utf-8" />

		<meta name="text-scale" content="scale" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="preload"
			href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Share+Tech+Mono&family=Syne:wght@700;800&family=Unbounded:wght@700;800&display=swap"
			as="style"
		/>

			href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Share+Tech+Mono&family=Syne:wght@700;800&family=Unbounded:wght@700;800&display=swap"
			rel="stylesheet"
		/>

			<style>
				body {
					opacity: 1 !important;
				}
			</style>
		</noscript>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
